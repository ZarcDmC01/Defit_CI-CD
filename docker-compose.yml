services:

  app:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: defit-app:latest
    container_name: defit_app
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  hf_cache:
    driver: local
